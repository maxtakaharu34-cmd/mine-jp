<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#bfbfbf" />
<title>マインスイーパー</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;color:#222;background:#bfbfbf;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
#app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;padding:8px;gap:8px}
.title{font-family:"Mochiy Pop P One",sans-serif;font-size:18px;margin:4px 0;color:#222}
.hud{display:flex;gap:8px;justify-content:center;width:100%;max-width:400px}
.hud .box{flex:1;background:#222;color:#ff3a3a;font-family:'Courier New',monospace;font-size:18px;font-weight:900;border:3px inset #fff;border-radius:6px;padding:4px;text-align:center}
.hud .smile{flex:0 0 50px;background:#ffe066;border:3px outset #fff;border-radius:8px;font-size:22px;cursor:pointer}
.hud .smile:active{border-style:inset}
.modes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.modes button{background:#fff;border:2px solid #222;padding:5px 10px;font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit}
.modes button.on{background:#ffe066}
.toggle{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:bold}
.toggle button{background:#5fc4ff;border:2px solid #222;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
.toggle button.flag{background:#ff5fa2;color:#fff}
.board-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;overflow:auto}
.board{display:grid;background:#7f7f7f;padding:3px;gap:1px}
.cell{width:30px;height:30px;background:#bfbfbf;border:2px outset #fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit}
.cell.open{background:#cfcfcf;border:1px solid #888}
.cell.flag{background:#bfbfbf;color:#ff3a3a;font-size:18px}
.cell.bomb{background:#ef4444;color:#000}
.cell.n1{color:#1976d2}.cell.n2{color:#388e3c}.cell.n3{color:#d32f2f}.cell.n4{color:#7b1fa2}.cell.n5{color:#5d4037}.cell.n6{color:#0097a7}.cell.n7{color:#000}.cell.n8{color:#666}
</style>
</head>
<body>
<div id="app">
<h1 class="title">マインスイーパー 💣</h1>
<div class="modes">
  <button data-m="9,10" class="on">易 9×9 / 10</button>
  <button data-m="12,20">中 12×12 / 20</button>
  <button data-m="14,35">難 14×14 / 35</button>
</div>
<div class="hud">
  <div class="box" id="mine">010</div>
  <button class="smile" id="smile">😀</button>
  <div class="box" id="time">000</div>
</div>
<div class="toggle">
  <button id="tog">🛠 開く</button>
</div>
<div class="board-wrap"><div class="board" id="board"></div></div>
</div>
<script>
(()=>{
'use strict';
const $=(id)=>document.getElementById(id);
let N=9,M=10,grid=null,opened=null,flag=null,running=false,timer=0,timerId=null,flagMode=false,won=false;
function newGame(){
  grid=Array.from({length:N},()=>Array(N).fill(0));
  opened=Array.from({length:N},()=>Array(N).fill(false));
  flag=Array.from({length:N},()=>Array(N).fill(false));
  // place bombs
  let placed=0;while(placed<M){const x=Math.floor(Math.random()*N),y=Math.floor(Math.random()*N);if(grid[y][x]!==-1){grid[y][x]=-1;placed++}}
  // counts
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){if(grid[y][x]===-1)continue;
    let c=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const nx=x+dx,ny=y+dy;if(nx<0||ny<0||nx>=N||ny>=N)continue;if(grid[ny][nx]===-1)c++}
    grid[y][x]=c;
  }
  running=true;won=false;timer=0;
  if(timerId)clearInterval(timerId);
  timerId=setInterval(()=>{if(running){timer++;$('time').textContent=String(timer).padStart(3,'0')}},1000);
  $('mine').textContent=String(M).padStart(3,'0');
  $('smile').textContent='😀';
  render();
}
function render(){
  const b=$('board');while(b.firstChild)b.removeChild(b.firstChild);
  b.style.gridTemplateColumns=`repeat(${N},30px)`;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const c=document.createElement('div');c.className='cell';
    if(opened[y][x]){c.classList.add('open');
      if(grid[y][x]===-1){c.classList.add('bomb');c.textContent='💣'}
      else if(grid[y][x]>0){c.classList.add('n'+grid[y][x]);c.textContent=grid[y][x]}
    }else if(flag[y][x]){c.classList.add('flag');c.textContent='🚩'}
    c.addEventListener('click',()=>tap(x,y));
    c.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(x,y)});
    b.appendChild(c);
  }
}
function tap(x,y){
  if(!running)return;
  if(flagMode){toggleFlag(x,y);return}
  if(flag[y][x]||opened[y][x])return;
  open(x,y);
  if(grid[y][x]===-1){running=false;$('smile').textContent='💀';revealAll();beep(110,.5,'sawtooth')}
  else checkWin();
  render();
}
function open(x,y){
  if(x<0||y<0||x>=N||y>=N)return;
  if(opened[y][x]||flag[y][x])return;
  opened[y][x]=true;
  if(grid[y][x]===0){for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)open(x+dx,y+dy)}
  beep(880,.03);
}
function toggleFlag(x,y){
  if(!running||opened[y][x])return;
  flag[y][x]=!flag[y][x];
  let f=0;for(const r of flag)for(const v of r)if(v)f++;
  $('mine').textContent=String(M-f).padStart(3,'0');
  beep(660,.04);render();
}
function revealAll(){for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(grid[y][x]===-1)opened[y][x]=true}
function checkWin(){
  let safe=0;for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(grid[y][x]!==-1&&opened[y][x])safe++;
  if(safe===N*N-M){running=false;won=true;$('smile').textContent='😎';fanfare()}
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.1)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))};
$('smile').addEventListener('click',()=>{en();newGame()});
$('tog').addEventListener('click',()=>{flagMode=!flagMode;const b=$('tog');b.textContent=flagMode?'🚩 旗':'🛠 開く';b.classList.toggle('flag',flagMode)});
document.querySelectorAll('.modes button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.modes button').forEach(x=>x.classList.toggle('on',x===b));
  const[n,m]=b.dataset.m.split(',').map(Number);N=n;M=m;newGame();
}));
newGame();
})();
</script>
</body>
</html>
